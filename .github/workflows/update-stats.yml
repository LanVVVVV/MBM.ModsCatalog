name: Update install stats

on:
  repository_dispatch:
    types: [mod_install]
  workflow_dispatch:
    inputs:
      modId:
        description: Mod id (DLL name without extension)
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump install counter
        env:
          MOD_ID: ${{ github.event.inputs.modId || github.event.client_payload.modId }}
        run: python .github/scripts/bump_stats.py "$MOD_ID"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(stats): bump ${{ github.event.inputs.modId || github.event.client_payload.modId }}"
