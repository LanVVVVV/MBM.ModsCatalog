name: Block stats branch PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]

jobs:
  close-stats-pr:
    if: github.head_ref == 'stats'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_request_number: pr.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                'Ветку `stats` **нельзя** сливать в `main`.',
                '',
                '- `stats` — отдельная ветка только со счётчиками (`stats.json`), без общей истории с `main`.',
                '- Обновляется только workflow **Update install stats**.',
                '- Лоадер читает файл с ветки `stats`, не из `main`.'
              ].join('\n')
            });
