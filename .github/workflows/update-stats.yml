name: Update install stats

on:
  repository_dispatch:
    types: [mod_install]
  workflow_dispatch:
    inputs:
      modId:
        description: Mod id (DLL name without extension)
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump install counter on stats branch
        env:
          MOD_ID: ${{ github.event.inputs.modId || github.event.client_payload.modId }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin stats >/dev/null 2>&1; then
            git fetch origin stats
            git show origin/stats:stats.json > stats.json
          elif git show origin/main:stats.json >/dev/null 2>&1; then
            git show origin/main:stats.json > stats.json
          else
            printf '%s\n' '{"version":1,"mods":{}}' > stats.json
          fi

          python .github/scripts/bump_stats.py "$MOD_ID"

          workdir="$(mktemp -d)"
          cp stats.json "$workdir/stats.json"
          cd "$workdir"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -q -m "chore(stats): bump $MOD_ID"
          git branch -M stats
          git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" stats

          echo "Pushed stats-only branch for $MOD_ID"
